<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мотивированные возражения — Ozon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/pizzip@3.1.7/dist/pizzip.js"></script>
<script src="https://unpkg.com/docxtemplater@3.48.0/build/docxtemplater.js"></script>
<style>
:root{
  --bg:#f4f3f0;--surface:#fff;--surface2:#f9f8f6;--surface3:#f1efe9;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);
  --text:#1a1a18;--text2:#6b6b67;--text3:#a8a8a4;
  --blue:#2355f5;--blue-bg:#eef1fe;--blue-text:#1a3db8;
  --green:#1a9e6e;--green-bg:#e4f5ef;--green-text:#0f6847;
  --amber:#d97706;--amber-bg:#fef3e2;--amber-text:#92520a;
  --red:#dc2626;--red-bg:#fef2f2;--red-text:#991b1b;
  --r:10px;--rl:14px;--font:'Golos Text',sans-serif;
}
[data-theme=dark]{
  --bg:#111110;--surface:#1c1c1a;--surface2:#242422;--surface3:#2b2b28;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#f0efe9;--text2:#8f8f8a;--text3:#5a5a56;
  --blue:#4f78ff;--blue-bg:#1a2040;--blue-text:#93aaff;
  --green-bg:#0f2a1f;--green-text:#4fd4a0;
  --amber-bg:#2a1f0a;--amber-text:#fbbf65;
  --red-bg:#2a1010;--red-text:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
body{min-height:100dvh}
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:9px}
.lm{width:28px;height:28px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lm svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2}
.lt{font-size:15px;font-weight:600;letter-spacing:-.02em}
.lt span{color:var(--blue)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.ibtn{width:30px;height:30px;border:1px solid var(--border2);border-radius:7px;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:14px;flex-shrink:0;font-family:var(--font)}
.ibtn:hover{background:var(--border);color:var(--text)}
.content{padding:24px 16px 48px;min-height:calc(100dvh - 52px);background:var(--bg)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px;max-width:900px;margin:0 auto}
.card-title{font-size:16px;font-weight:600;letter-spacing:-.02em;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.sec{margin-bottom:18px}
.sec-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.fg{margin-bottom:10px}
.fl{font-size:11px;color:var(--text2);font-weight:500;display:block;margin-bottom:4px;letter-spacing:.02em;text-transform:uppercase}
.fi,.fselect{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;outline:none;font-family:var(--font);transition:border-color .12s}
.fi:focus,.fselect:focus{border-color:var(--blue);background:var(--surface2)}
.fi[readonly]{opacity:.8;cursor:not-allowed;border-style:dashed}
.fi-auto{background:var(--blue-bg);color:var(--blue-text);border-color:rgba(35,85,245,.2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.tpl-block{background:var(--surface2);border:1px dashed var(--border2);border-radius:8px;padding:12px}
.tpl-info{font-size:12px;color:var(--text2);margin-bottom:8px}
.btn{padding:7px 14px;border:1px solid var(--border2);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;font-family:var(--font);font-weight:500;transition:all .12s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(.98)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-p:hover{background:#1a44dd;border-color:#1a44dd}
.btn-g{background:var(--green);color:#fff;border-color:var(--green)}
.btn-g:hover{background:#13875d;border-color:#13875d}
.btn-d{color:var(--red-text);border-color:currentColor}
.btn-d:hover{background:var(--red-bg)}
.btn-s{padding:5px 11px;font-size:12px;border-radius:7px}
.btn-gen{width:100%;padding:12px;font-size:14px;font-weight:600;justify-content:center;border-radius:var(--r);margin-top:16px}
.auto-badge{font-size:9px;background:var(--blue-bg);color:var(--blue-text);border-radius:20px;padding:1px 6px;font-weight:600;letter-spacing:.03em;margin-left:4px;vertical-align:middle}
.detail{border:1px solid var(--border);border-radius:10px;background:var(--surface2);overflow:hidden;margin-bottom:10px}
.detail summary{list-style:none;cursor:pointer;padding:12px 14px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:10px}
.detail summary::-webkit-details-marker{display:none}
.detail summary span:last-child{color:var(--text2);font-size:12px;font-weight:500}
.detail-body{padding:0 14px 14px}
.spec-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.spec-title{font-size:13px;font-weight:600}
.spec-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.spec-main{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.spec-main .fg{min-width:0}
.spec-main .fl{font-size:10px;line-height:1.25}
.spec-main .fi,.spec-main .fselect{font-size:12px;padding:8px 10px}
.tco{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.to{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:10px 16px;font-size:13px;font-weight:500;animation:tin .2s ease;max-width:340px}
.to.s{border-left:3px solid var(--green)}
.to.e{border-left:3px solid var(--red)}
.to.i{border-left:3px solid var(--blue)}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:5px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:6px}
@media (max-width:760px){
  .card{padding:16px}
  .grid2,.grid3,.spec-main{grid-template-columns:1fr}
  .spec-head{align-items:flex-start;flex-direction:column}
  .spec-actions{width:100%}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <div class="lm"><svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><path d="M9 12h6M12 9v6"/></svg></div>
    <div class="lt">Ozon<span>Возражения</span></div>
  </div>
  <div class="topbar-right">
    <span style="font-size:12px;color:var(--text3)">Мотивированные возражения</span>
    <button class="ibtn" onclick="toggleTheme()" title="Тема">◑</button>
  </div>
</div>

<div class="content">
  <div class="card">
    <div class="card-title">
      📋 Заполнение возражений к приемке товара
    </div>

    <div class="sec">
      <div class="sec-label">Основные данные</div>
      <div class="grid2">
        <div class="fg">
          <label class="fl" for="doc_date">Дата документа <span class="auto-badge">авто</span></label>
          <input class="fi" id="doc_date" type="text" value="">
        </div>
        <div class="fg">
          <label class="fl" for="firm_name">Наименование фирмы</label>
          <select class="fselect" id="firm_name">
            <option value="ООО «ЛП «ХОТС»" selected>ООО «ЛП «ХОТС»</option>
            <option value="ООО «ХОТС»">ООО «ХОТС»</option>
            <option value="ООО «ТД ХОТС»">ООО «ТД ХОТС»</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label class="fl" for="director_fio">ФИО директора</label>
        <input class="fi" id="director_fio" type="text" value="Безрук Владимира Валерьевича" placeholder="Иванов Иван Иванович">
      </div>
      <div class="grid2">
        <div class="fg">
          <label class="fl" for="request_number">Номер заявки</label>
          <input class="fi" id="request_number" type="text" placeholder="12345">
        </div>
        <div class="fg">
          <label class="fl" for="request_date">Дата заявки</label>
          <input class="fi" id="request_date" type="date">
        </div>
      </div>
      <div class="grid2">
        <div class="fg">
          <label class="fl" for="ozon_contract">Договор Ozon</label>
          <input class="fi" id="ozon_contract" type="text" value="МП ИР-206295/23" placeholder="МП ИР-000000/00">
        </div>
        <div class="fg">
          <label class="fl" for="ozon_date">Дата договора Ozon</label>
          <input class="fi" id="ozon_date" type="text" value="20.06.2023г." placeholder="01.01.2025">
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-label">Товары в коробах</div>
      <div id="items_container"></div>
      <div style="margin-top:10px">
        <button class="btn btn-s btn-g" type="button" onclick="addItem()">＋ Добавить позицию</button>
        <span style="font-size:12px;color:var(--text2);margin-left:8px" id="item_counter">1 позиция</span>
      </div>
    </div>

    <div class="sec">
      <div class="sec-label">Подпись</div>
      <div class="grid2">
        <div class="fg">
          <label class="fl" for="director_initials">Инициалы директора <span class="auto-badge">авто</span></label>
          <input class="fi fi-auto" id="director_initials" type="text" readonly placeholder="Заполните ФИО выше">
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-label">Шаблон</div>
      <div class="tpl-block">
        <div class="tpl-info">📄 Шаблон из папки проекта — vozrageniya_fixed.docx</div>
      </div>
    </div>

    <button class="btn btn-p btn-gen" type="button" onclick="generateDocument()">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v9M4 7l4 4 4-4M2 14h12"/></svg>
      Скачать документ
    </button>
  </div>
</div>

<div class="tco" id="tco"></div>

<script>
const MAX_ITEMS = 20;
const DASH = '—';

let items = [{index:1, boxId:'', sku:'', qty:'', quality:''}];

function formatDate(){
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const d = new Date();
  return '"' + String(d.getDate()).padStart(2,'0') + '" ' + months[d.getMonth()] + ' ' + d.getFullYear() + ' г.';
}

function formatDateInput(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr);
  if(isNaN(d)) return dateStr;
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  return dd + '.' + mm + '.' + yyyy;
}

function getInitials(fullName){
  const parts = fullName.trim().split(/\s+/).filter(Boolean);
  if(!parts.length) return '';
  if(parts.length === 1) return parts[0];
  const surname = parts[0];
  const initials = parts.slice(1).map(p => p[0].toUpperCase() + '.').join('');
  return initials + ' ' + surname;
}

function toast(msg, type='s'){
  const el = document.createElement('div');
  el.className = 'to ' + type;
  el.textContent = msg;
  document.getElementById('tco').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function escapeHtml(value){
  return String(value||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderItems(){
  const container = document.getElementById('items_container');
  container.innerHTML = items.map((item, idx) => (
    '<div class="detail">' +
      '<div class="spec-head" style="padding:12px 14px 0">' +
        '<div class="spec-title">Позиция ' + item.index + '</div>' +
        '<div class="spec-actions">' +
          '<button class="btn btn-s btn-d" type="button" onclick="removeItem(' + idx + ')" ' + (items.length>1?'':'style="display:none"') + '>Удалить</button>' +
        '</div>' +
      '</div>' +
      '<div class="detail-body">' +
        '<div class="spec-main">' +
          '<div class="fg"><label class="fl">ID короба</label><input class="fi" id="box_' + idx + '" type="text" value="' + escapeHtml(item.boxId) + '" placeholder="BOX-001"></div>' +
          '<div class="fg"><label class="fl">SKU номер</label><input class="fi" id="sku_' + idx + '" type="text" value="' + escapeHtml(item.sku) + '" placeholder="SKU123"></div>' +
          '<div class="fg"><label class="fl">Количество (шт)</label><input class="fi" id="qty_' + idx + '" type="text" value="' + escapeHtml(item.qty) + '" placeholder="10"></div>' +
          '<div class="fg"><label class="fl">Текст качество</label><input class="fi" id="qual_' + idx + '" type="text" value="' + escapeHtml(item.quality) + '" placeholder="Повреждение"></div>' +
        '</div>' +
      '</div>' +
    '</div>'
  )).join('');

  items.forEach((item, idx) => {
    document.getElementById('box_' + idx).addEventListener('input', e => { item.boxId = e.target.value; });
    document.getElementById('sku_' + idx).addEventListener('input', e => { item.sku = e.target.value; });
    document.getElementById('qty_' + idx).addEventListener('input', e => { item.qty = e.target.value; });
    document.getElementById('qual_' + idx).addEventListener('input', e => { item.quality = e.target.value; });
  });
  document.getElementById('item_counter').textContent = items.length + ' ' + plural(items.length, 'позиция', 'позиции', 'позиций');
}

function addItem(){
  if(items.length >= MAX_ITEMS) return;
  items.push({index: items.length + 1, boxId:'', sku:'', qty:'', quality:''});
  renderItems();
}

function removeItem(idx){
  if(items.length <= 1){ items[0] = {index:1, boxId:'', sku:'', qty:'', quality:''}; renderItems(); return; }
  items.splice(idx, 1);
  items.forEach((item, i) => item.index = i + 1);
  renderItems();
}

function plural(n, one, two, five){
  const m = n % 100;
  const mm = n % 10;
  if(m >= 11 && m <= 19) return five;
  if(mm === 1) return one;
  if(mm >= 2 && mm <= 4) return two;
  return five;
}

function bindAutoFields(){
  document.getElementById('director_fio').addEventListener('input', function(){
    document.getElementById('director_initials').value = getInitials(this.value);
  });
  // Trigger once
  document.getElementById('director_initials').value = getInitials(document.getElementById('director_fio').value);
}

function getRenderData(){
  const requestDateRaw = document.getElementById('request_date').value;
  const requestDate = requestDateRaw ? formatDateInput(requestDateRaw) : '';

  const data = {
    'Дата_договора': document.getElementById('doc_date').value || DASH,
    'Фирма': document.getElementById('firm_name').value.trim() || DASH,
    'ФИО_директора': document.getElementById('director_fio').value.trim() || DASH,
    'Номер заявки': document.getElementById('request_number').value.trim() || DASH,
    'дата заявки': requestDate || DASH,
    'Договор озон': document.getElementById('ozon_contract').value.trim() || DASH,
    'дата озон': document.getElementById('ozon_date').value.trim() || DASH,
    'Инициалы директора': document.getElementById('director_initials').value.trim() || DASH,
    'items': items.filter(i => i.boxId.trim() || i.sku.trim() || i.qty.trim() || i.quality.trim()).map((item) => ({
      'num': String(item.index) + '.',
      'id короба': item.boxId.trim() || DASH,
      'SKU номер': item.sku.trim() || DASH,
      'шт': item.qty.trim() || DASH,
      'текст качество': item.quality.trim() || DASH
    }))
  };

  return data;
}

async function loadTemplate(path){
  const response = await fetch(path);
  if(!response.ok) throw new Error('Не удалось загрузить шаблон');
  return new PizZip(await response.arrayBuffer());
}

function createDoc(zipData, renderData){
  const doc = new window.docxtemplater(zipData, {
    paragraphLoop: true,
    delimiters: {start: '{{', end: '}}'},
    nullGetter: function(){ return ''; }
  });
  doc.render(renderData);
  return doc;
}

function blobToDownload(blob, fileName){
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.href = url;
  link.download = fileName;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function getSafeToken(value){
  return value.replace(/[^a-zA-Zа-яА-Я0-9]/g, '_');
}

async function generateDocument(){
  const btn = document.querySelector('.btn-gen');
  const originalText = btn.innerHTML;
  btn.innerHTML = '⏳ Генерация...';
  btn.disabled = true;

  try {
    const zipData = await loadTemplate('./vozrageniya_fixed.docx');
    const renderData = getRenderData();
    const doc = createDoc(zipData, renderData);
    const out = doc.getZip().generate({
      type: 'blob',
      mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
    });
    const safeNumber = getSafeToken(document.getElementById('request_number').value.trim() || 'без_номера');
    const safeDate = getSafeToken(document.getElementById('doc_date').value.trim() || '');
    blobToDownload(out, 'Возражения_' + safeNumber + '_' + safeDate + '.docx');
    toast('Документ сгенерирован и скачан', 's');
  } catch(e) {
    console.error(e);
    toast('Ошибка: ' + (e.message || 'не удалось сгенерировать документ'), 'e');
  } finally {
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
}

function toggleTheme(){
  const nextTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', nextTheme);
  localStorage.setItem('cf_theme', nextTheme);
}
document.body.setAttribute('data-theme', localStorage.getItem('cf_theme') || 'light');

// Init
document.getElementById('doc_date').value = formatDate();
renderItems();
bindAutoFields();
</script>
</body>
</html>
