<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МиниCRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f3f0;--surface:#fff;--surface2:#f9f8f6;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);
  --text:#1a1a18;--text2:#6b6b67;--text3:#a8a8a4;
  --blue:#2355f5;--blue-bg:#eef1fe;--blue-text:#1a3db8;
  --green:#1a9e6e;--green-bg:#e4f5ef;--green-text:#0f6847;
  --amber:#d97706;--amber-bg:#fef3e2;--amber-text:#92520a;
  --red:#dc2626;--red-bg:#fef2f2;--red-text:#991b1b;
  --purple:#7c3aed;--purple-bg:#f0effe;--purple-text:#4338ca;
  --gold:#b45309;--gold-bg:#fef9c3;
  --tg:#0088cc;--tg-bg:#e8f4fa;
  --r:10px;--rl:14px;--font:'Golos Text',sans-serif;--mono:'JetBrains Mono',monospace;
  --sw:215px;--th:52px;
}
[data-theme=dark]{
  --bg:#111110;--surface:#1c1c1a;--surface2:#242422;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#f0efe9;--text2:#8f8f8a;--text3:#5a5a56;
  --blue:#4f78ff;--blue-bg:#1a2040;--blue-text:#93aaff;
  --green-bg:#0f2a1f;--green-text:#4fd4a0;
  --amber-bg:#2a1f0a;--amber-text:#fbbf65;
  --red-bg:#2a1010;--red-text:#f87171;
  --purple-bg:#1e1a40;--purple-text:#a5b4fc;
  --gold:#d97706;--gold-bg:#2a1f0a;
  --tg-bg:#0a1f2a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}
/* LOGIN */
.lscr{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.lbox{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);padding:32px 28px;width:340px}
.llogo{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.lm2{width:34px;height:34px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center}
.lm2 svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2}
.lt2{font-size:18px;font-weight:600;letter-spacing:-.02em}.lt2 span{color:var(--blue)}
.lerr{font-size:12px;color:var(--red-text);background:var(--red-bg);border-radius:7px;padding:8px 11px;margin-bottom:12px;display:none}
.lfg{margin-bottom:13px}.lfg label{font-size:11px;color:var(--text2);font-weight:500;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.lfg input{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;font-family:var(--font);outline:none}
.lfg input:focus{border-color:var(--blue)}
.lbtn{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer}
.lbtn:hover{background:#1a44dd}
.sb-note{font-size:11px;color:var(--amber-text);background:var(--amber-bg);border-radius:7px;padding:7px 10px;margin-bottom:12px;display:none}
/* SIDEBAR */
.sidebar{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.slogo{padding:14px 14px 12px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border)}
.slogo .lm{width:28px;height:28px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.slogo .lm svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2}
.slogo .lt{font-size:15px;font-weight:600;letter-spacing:-.02em}.slogo .lt span{color:var(--blue)}
.sync-dot{width:7px;height:7px;border-radius:50%;margin-left:auto;flex-shrink:0;cursor:help}
.sync-ok{background:var(--green)}.sync-local{background:var(--amber)}.sync-err{background:var(--red)}
.snav{padding:8px;flex:1;overflow-y:auto}
.nsec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:10px 10px 4px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .12s;margin-bottom:2px;border:1px solid transparent}
.ni:hover{background:var(--surface2);color:var(--text)}
.ni.active{background:var(--blue-bg);color:var(--blue-text);border-color:rgba(35,85,245,.12)}
.ni svg{width:15px;height:15px;flex-shrink:0}
.nbadge{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:600;font-family:var(--mono)}
.sfooter{padding:10px 8px;border-top:1px solid var(--border)}
.urow{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;font-family:var(--mono)}
.av-super{background:var(--gold-bg);color:var(--gold)}
.av-admin{background:var(--purple-bg);color:var(--purple)}
.av-manager{background:var(--blue-bg);color:var(--blue-text)}
.uinfo{flex:1;min-width:0}
.uname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uname-super{color:var(--gold)}.uname-admin{color:var(--purple)}
.urole{font-size:10px;color:var(--text3)}
.ibtn{width:26px;height:26px;border:1px solid var(--border2);border-radius:6px;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:12px;flex-shrink:0}
.ibtn:hover{background:var(--border);color:var(--text)}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:var(--th);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0}
.sw2{flex:1;max-width:320px;position:relative}
.sw2 svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:1.8;pointer-events:none}
.sw2 input{width:100%;padding:7px 10px 7px 32px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;font-family:var(--font);outline:none}
.sw2 input:focus{border-color:var(--blue)}
.sw2 input::placeholder{color:var(--text3)}
.tra{display:flex;gap:8px;margin-left:auto;align-items:center}
.btn{padding:7px 14px;border:1px solid var(--border2);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;font-family:var(--font);font-weight:500;transition:all .12s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface2)}.btn:active{transform:scale(.98)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-p:hover{background:#1a44dd;border-color:#1a44dd}
.btn-s{padding:5px 11px;font-size:12px;border-radius:7px}
.btn-d{color:var(--red-text);border-color:var(--red-text)}.btn-d:hover{background:var(--red-bg)}
.btn-g{color:var(--green-text);border-color:var(--green-text)}.btn-g:hover{background:var(--green-bg)}
.btn-tg{color:var(--tg);border-color:var(--tg)}.btn-tg:hover{background:var(--tg-bg)}
.content{flex:1;overflow-y:auto;padding:18px}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px}
.sl{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:7px}
.sv{font-size:21px;font-weight:600;letter-spacing:-.03em;font-family:var(--mono)}
/* KANBAN */
.kw-outer{position:relative;overflow:hidden}
.kw-scroll{overflow-x:auto;overflow-y:hidden;display:flex;flex-direction:column-reverse;padding:0 0 2px}
.kw-scroll::-webkit-scrollbar{height:6px}
.kw-scroll::-webkit-scrollbar-track{background:var(--surface2);border-radius:6px;margin:2px}
.kw-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:6px}
.kw-scroll::-webkit-scrollbar-thumb:hover{background:var(--blue)}
.kw{display:flex;gap:12px;align-items:flex-start;padding:8px 2px 4px}
.kol{min-width:224px;width:224px;flex-shrink:0;display:flex;flex-direction:column}
.kh{padding:9px 12px;border-radius:var(--r) var(--r) 0 0;font-size:12px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:6px}
.kb{background:var(--surface2);border-radius:0 0 var(--r) var(--r);padding:8px;min-height:80px;border:1px solid var(--border);border-top:none;transition:background .15s}
.kb.dov{background:var(--blue-bg);outline:2px dashed var(--blue);outline-offset:-3px}
.dc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:8px;cursor:grab;user-select:none;transition:border-color .15s,opacity .15s;position:relative}
.dc:hover{border-color:var(--border2)}.dc.dragging{opacity:.3;cursor:grabbing}
.dc.task-card{cursor:pointer;border-left:3px solid var(--amber)}
.dc.task-card.ov-card{border-left-color:var(--red)}
.dco{cursor:pointer;display:flex;align-items:center;gap:4px;font-size:11px;color:var(--blue-text);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.dco:hover{opacity:.7}
.dn{font-size:13px;font-weight:600;letter-spacing:-.01em;margin-bottom:2px}
.dct{font-size:11px;color:var(--text2)}
.dam{font-size:12px;color:var(--blue);font-weight:600;margin-top:4px;font-family:var(--mono)}
.df{display:flex;align-items:center;justify-content:space-between;margin-top:4px;flex-wrap:wrap;gap:3px}
.tag{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.02em}
.ta{background:var(--blue-bg);color:var(--blue-text)}.tp{background:var(--amber-bg);color:var(--amber-text)}
.dl{height:2px;background:var(--blue);border-radius:2px;margin-bottom:6px;display:none}
.kadd{text-align:center;padding:7px;cursor:pointer;font-size:12px;color:var(--text3);border-radius:7px;transition:all .12s;border:1px dashed transparent}
.kadd:hover{border-color:var(--border2);color:var(--text2);background:var(--surface)}
.rbadge{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--amber)}
.rbadge.ov{background:var(--red)}
.asgn-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.asgn-chip{display:inline-flex;align-items:center;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 6px;font-size:10px;color:var(--text2)}
.asgn-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0}
.kh-label{font-size:12px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kh-input{background:none;border:none;outline:none;font-size:12px;font-weight:600;color:inherit;width:calc(100% - 28px);font-family:var(--font);cursor:text}
.kh-del{background:none;border:none;cursor:pointer;color:inherit;opacity:.55;font-size:13px;padding:1px 3px;border-radius:3px}
.kh-del:hover{opacity:1;background:rgba(0,0,0,.1)}
.add-stage-col{min-width:170px;width:170px;flex-shrink:0}
.add-stage-btn{border:1px dashed var(--border2);border-radius:var(--r);padding:14px 12px;cursor:pointer;font-size:12px;color:var(--text3);text-align:center;transition:all .15s;height:44px;display:flex;align-items:center;justify-content:center}
.add-stage-btn:hover{border-color:var(--blue);color:var(--blue-text);background:var(--blue-bg)}
.note-short{font-size:11px;color:var(--text2);margin-top:5px;line-height:1.5}
.note-more{font-size:10px;color:var(--blue-text);cursor:pointer;margin-top:2px;display:inline-block}
.note-more:hover{text-decoration:underline}
.task-rems{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:3px}
.trr{font-size:10px;padding:4px 6px;background:var(--surface2);border-radius:6px;border:1px solid var(--border)}
.trr.ov{background:var(--red-bg);border-color:var(--red-text)}
.trr-text{color:var(--text2);font-weight:500;line-height:1.3;margin-bottom:1px}
.trr.ov .trr-text{color:var(--red-text)}
.trr-time{color:var(--text3);font-family:var(--mono);font-size:9px}
.trr.ov .trr-time{color:var(--red-text);opacity:.8}
/* DEAL PANEL */
.pov{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:500;display:none}
.pov.open{display:block}
.dpanel{position:fixed;top:0;right:0;height:100vh;background:var(--surface);border-left:1px solid var(--border2);z-index:501;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);width:880px;max-width:96vw}
.dpanel.open{transform:translateX(0)}
.dp-resize{position:absolute;left:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:1;background:transparent}
.dp-resize:hover,.dp-resize.active{background:var(--blue);opacity:.3}
.dph{padding:13px 18px 13px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.dptitle{font-size:16px;font-weight:600;flex:1;letter-spacing:-.02em;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dpb{flex:1;display:flex;overflow:hidden}
.dpi{width:265px;min-width:200px;flex-shrink:0;border-right:1px solid var(--border);padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:11px}
.dst{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.ef{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:7px;border:1px solid transparent;cursor:pointer;transition:all .12s;min-height:30px}
.ef:hover{background:var(--surface2);border-color:var(--border)}
.ef-label{font-size:11px;color:var(--text3);width:56px;flex-shrink:0}
.ef-val{font-size:13px;color:var(--text);flex:1;min-width:0}
.ef-edit{font-size:10px;color:var(--text3);opacity:0;transition:opacity .12s}
.ef:hover .ef-edit{opacity:1}
.ef-input{font-size:13px;color:var(--text);font-family:var(--font);background:var(--surface2);border:1px solid var(--blue);border-radius:6px;padding:4px 8px;outline:none;flex:1;min-width:0}
.dpss{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;font-family:var(--font);outline:none}
.nota{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-size:12px;font-family:var(--font);resize:none;outline:none;line-height:1.6;min-height:70px}
.nota:focus{border-color:var(--blue)}
.asgn-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:9px 10px}
.asgn-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.asgn-item{display:flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:3px 8px;font-size:11px}
.asgn-rm{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:0 2px;line-height:1}
.asgn-rm:hover{color:var(--red)}
.rb{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:9px 10px}
.rl{display:flex;flex-direction:column;gap:5px;margin-top:7px}
.ri{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 7px;background:var(--surface);border:1px solid var(--border);border-radius:7px}
.ri.ov{border-color:var(--red-text);background:var(--red-bg)}
.ri.done{opacity:.4}
.rit{flex:1;min-width:0}
.rit-text{font-size:12px;color:var(--text);line-height:1.3}
.rit-meta{display:flex;align-items:center;gap:6px;margin-top:2px}
.ritm{font-size:10px;color:var(--text3);font-family:var(--mono)}
.ri.ov .ritm{color:var(--red-text)}
.ri-who{font-size:10px;color:var(--blue-text)}
.ribtn{width:20px;height:20px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:12px;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0}
.ribtn:hover{background:var(--surface2);color:var(--text)}
.dpc{flex:1;display:flex;flex-direction:column;min-width:0}
.dpch{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px}
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;background:var(--bg)}
.msg{max-width:76%;padding:9px 13px;font-size:13px;line-height:1.55;word-break:break-word}
.mi{background:var(--surface);border:1px solid var(--border);border-radius:4px 14px 14px 14px;align-self:flex-start}
.mo{background:var(--blue);color:#fff;border-radius:14px 4px 14px 14px;align-self:flex-end}
.msg-tg{border-left:3px solid var(--tg)}
.mt{font-size:10px;opacity:.5;margin-top:4px;text-align:right;font-family:var(--mono)}
.mau{font-size:10px;color:var(--text3);margin-bottom:3px}
.mfile{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;cursor:pointer}
.mfile:hover{border-color:var(--border2)}
.mfi{width:28px;height:28px;background:var(--blue-bg);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.inr{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;background:var(--surface);flex-shrink:0}
.inr textarea{flex:1;resize:none;border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:13px;background:var(--surface2);color:var(--text);outline:none;min-height:40px;max-height:100px;font-family:var(--font);line-height:1.5}
.inr textarea:focus{border-color:var(--blue)}
/* CHATS */
.chl{display:flex;height:calc(100vh - var(--th) - 36px);min-height:360px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.chlist{width:280px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto}
.cllh{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600}
.chi{padding:9px 13px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s}
.chi:hover{background:var(--surface2)}.chi.active{background:var(--blue-bg)}
.chrow{display:flex;gap:9px;align-items:flex-start}
.chav{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.chm{flex:1;min-width:0}
.chn{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chp{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.cha{font-size:10px;color:var(--text3);margin-top:1px}
.cht{font-size:10px;color:var(--text3);font-family:var(--mono)}
.ud{width:8px;height:8px;background:var(--blue);border-radius:50%;margin-top:5px;flex-shrink:0}
.chwin{flex:1;display:flex;flex-direction:column;min-width:0}
.chwh{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface)}
/* CONTACTS */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:15px;transition:border-color .12s}
.cc:hover{border-color:var(--border2)}
.cc.ac{display:flex;align-items:center;justify-content:center;cursor:pointer;min-height:140px;border-style:dashed}
.cc.ac:hover{border-color:var(--blue);background:var(--blue-bg)}
.cch{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cci{font-size:12px;color:var(--text2);line-height:2}
/* SETTINGS */
.ss{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:14px}
.st{font-size:14px;font-weight:600;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--border)}
/* Spoiler / collapsible section */

// ── CRYPTO: SHA-256 ───────────────────────────────────────────
async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function sbFetch(path,opts={}){

  });

}

// Загрузить ТОЛЬКО общие ключи из Supabase (с конфликт-резолюцией по updated_at)
async function sbPullShared(){
  if(!sbReady)return;
  setSyncDot('syncing');
  try{
    const r=await sbFetch('?key=in.('+SHARED_KEYS.map(k=>'"'+k+'"').join(',')+')&select=key,value,updated_at');
    const rows=await r.json();
    rows.forEach(row=>{
      const localTs=localStorage.getItem('crm7__ts_'+row.key)||'0';
      const remoteTs=row.updated_at||'0';
      if(remoteTs>=localTs){
        localStorage.setItem('crm7_'+row.key,JSON.stringify(row.value));
        localStorage.setItem('crm7__ts_'+row.key,remoteTs);
      }
    });
    setSyncDot('ok');
  }catch(e){setSyncDot('err');console.warn('SB pull failed',e);}
}

// ── SUPABASE PUSH RETRY QUEUE ────────────────────────────────
const _pushQ=[];
let _pushBusy=false;

async function sbPushKey(key,value){
  if(!sbReady||!SHARED_KEYS.includes(key))return;
  const i=_pushQ.findIndex(q=>q.key===key);
  if(i>=0)_pushQ.splice(i,1);
  _pushQ.push({key,value,ts:new Date().toISOString()});
  processPushQueue();
}

async function processPushQueue(){
  if(_pushBusy||_pushQ.length===0)return;
  _pushBusy=true;setSyncDot('syncing');
  while(_pushQ.length>0){
    const item=_pushQ[0];
    try{
      await sbFetch('',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({key:item.key,value:item.value,updated_at:item.ts})});
      localStorage.setItem('crm7__ts_'+item.key,item.ts);
      _pushQ.shift();setSyncDot('ok');
    }catch(e){
      setSyncDot('err');console.warn('Push failed, повтор через 10 сек',e);
      setTimeout(processPushQueue,10000);
      break;
    }
  }
  _pushBusy=false;
}

// ── SUPABASE STORAGE: загрузка файлов ─────────────────────────
async function uploadFileToStorage(file){
  if(!sbReady)return null;
  const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const path=Date.now()+'_'+safeName;
  try{
    const r=await fetch(SUPABASE_URL+'/storage/v1/object/'+SB_BUCKET+'/'+path,{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':file.type||'application/octet-stream'},
      body:file
    });
    if(!r.ok)throw new Error('Storage '+r.status);
    return SUPABASE_URL+'/storage/v1/object/public/'+SB_BUCKET+'/'+path;
  }catch(e){console.warn('Storage upload failed, fallback base64',e);return null;}
}

// ── STATE ──────────────────────────────────────────────────
// SESSION — берём только из localStorage, НЕ из Supabase
let S={
  user:LS.get('user',null),
  ac:LS.get('ac',0),
  page:LS.get('page','dashboard'),
  theme:LS.get('theme','light'),
  taskFilter:LS.get('taskFilter','me'),
  ndi:LS.get('ndi',10),nci:LS.get('nci',10),nmi:LS.get('nmi',10),nsi:LS.get('nsi',10),
  // SHARED — будут обновлены из Supabase при загрузке
  deals:LS.get('deals',DD),
  contacts:LS.get('contacts',DC),
  chats:LS.get('chats',DCH),
  managers:LS.get('managers',DM),
  stages:LS.get('stages',DSTAGES),
  openDeal:null,
};

function save(){
  // SESSION keys — только localStorage, никогда в Supabase
  SESSION_KEYS.forEach(k=>{
    if(k!=='openDeal')localStorage.setItem('crm7_'+k,JSON.stringify(S[k]));
  });
  // SHARED keys — localStorage + Supabase (async)
  SHARED_KEYS.forEach(k=>LS.set(k,S[k]));
}

// ── TASK LOGIC ─────────────────────────────────────────────
const TBUCKETS=[{key:'today',label:'Задачи на сегодня'},{key:'tomorrow',label:'Задачи на завтра'},{key:'after',label:'На послезавтра'},{key:'later',label:'Следующие дни'}];
function todayStr(){return new Date().toISOString().slice(0,10);}
function tomorrowStr(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);}
function afterStr(){const d=new Date();d.setDate(d.getDate()+2);return d.toISOString().slice(0,10);}
function isTaskDeal(d,name){return(d.reminders||[]).some(r=>!r.done&&(!r.who||r.who===name));}
function dealBucket(d,name){const p=(d.reminders||[]).filter(r=>!r.done&&(!r.who||r.who===name));if(!p.length)return null;p.sort((a,b)=>new Date(a.datetime)-new Date(b.datetime));const s=p[0].datetime.slice(0,10);if(s<=todayStr())return'today';if(s===tomorrowStr())return'tomorrow';if(s===afterStr())return'after';return'later';}
function firstKey(){return S.stages[0]?.key||'new';}
function secondKey(){return S.stages[1]?.key||'contact';}

// ── ROLES ──────────────────────────────────────────────────
function isSuperAdmin(){return S.user?.role==='superadmin';}
function isAdmin(){return['superadmin','admin'].includes(S.user?.role);}
function roleColor(r){return r==='superadmin'?'var(--gold)':r==='admin'?'var(--purple)':'var(--text)';}
function roleBgCls(r){return r==='superadmin'?'av-super':r==='admin'?'av-admin':'av-manager';}
function roleNameCls(r){return r==='superadmin'?'uname-super':r==='admin'?'uname-admin':'';}
function roleLabel(r){return r==='superadmin'?'Супер-администратор':r==='admin'?'Администратор':'Менеджер';}
function roleBadge(r){return r==='superadmin'?'rsa':r==='admin'?'ra':'rm';}

// ── AUTH ───────────────────────────────────────────────────
function showLoginErr(msg){const el=document.getElementById('lerr');el.textContent=msg;el.style.display='block';}
async function doLogin(){
  const now=Date.now();
  if(now<_lt.lockedUntil){
    const secs=Math.ceil((_lt.lockedUntil-now)/1000);
    showLoginErr('Аккаунт заблокирован. Подождите '+secs+' сек.');return;
  }
  const l=document.getElementById('ll').value.trim(),p=document.getElementById('lp').value;
  if(!l||!p){showLoginErr('Заполните логин и пароль');return;}
  const hash=await sha256(p);
  // Поддерживаем оба формата: SHA-256 (хэш) и plaintext (до миграции)
  const m=S.managers.find(m=>m.login===l&&(m.passwordHash===hash||(!m.passwordHash&&m.password===p)));
  if(!m){
    _lt.attempts++;
    if(_lt.attempts>=5){_lt.lockedUntil=Date.now()+30000;_lt.attempts=0;showLoginErr('Слишком много попыток. Заблокировано на 30 сек.');}
    else{showLoginErr('Неверный логин или пароль (попытка '+_lt.attempts+'/5)');}
    return;
  }
  _lt.attempts=0;
  document.getElementById('lerr').style.display='none';
  S.user=m;
  localStorage.setItem('crm7_user',JSON.stringify(m));
  showApp();
}
function doLogout(){
  S.user=null;localStorage.setItem('crm7_user',JSON.stringify(null));
  document.getElementById('app').style.display='none';
  document.getElementById('ls').style.display='flex';
}
async function showApp(){
  document.getElementById('ls').style.display='none';
  document.getElementById('app').style.display='flex';
  applyTheme();updateSb();
  if(!sbReady){setSyncDot('local');}
  else{
    toast('Синхронизация...','i');
    await sbPullShared();
    // Обновляем только SHARED данные из localStorage (куда sbPullShared записал)
    SHARED_KEYS.forEach(k=>{S[k]=LS.get(k,S[k]);});
    // user НЕ трогаем — он остаётся тем кто залогинился
  }
  // Мигрируем plaintext пароли → SHA-256 хэши (одноразово)
  await migratePasswords();
  render();startChecker();initPanelResize();
  if(!sbReady)document.getElementById('sb-note').style.display='block';
}
function updateSb(){
  const u=S.user;if(!u)return;
  const av=document.getElementById('sbav');av.textContent=ini(u.name);av.className='av '+roleBgCls(u.role);av.style.cssText='width:30px;height:30px;font-size:11px';
  const nm=document.getElementById('sbname');nm.textContent=u.name;nm.className='uname '+roleNameCls(u.role);
  document.getElementById('sbrole').textContent=roleLabel(u.role);
  document.getElementById('nav-s').style.display=isAdmin()?'':'none';
}
function ini(n){return(n||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function applyTheme(){document.body.setAttribute('data-theme',S.theme);}
function toggleTheme(){S.theme=S.theme==='light'?'dark':'light';applyTheme();localStorage.setItem('crm7_theme',JSON.stringify(S.theme));}

// ── NAV ────────────────────────────────────────────────────
document.querySelectorAll('.ni').forEach(el=>el.addEventListener('click',()=>nav(el.dataset.page)));
function nav(p){
  if(p==='settings'&&!isAdmin()){toast('Нет доступа','e');return;}
  S.page=p;document.querySelectorAll('.ni').forEach(e=>e.classList.remove('active'));
  const el=document.querySelector(`.ni[data-page="${p}"]`);if(el)el.classList.add('active');
  render();localStorage.setItem('crm7_page',JSON.stringify(p));
}

// ── HELPERS ────────────────────────────────────────────────
function fmt(n){return Number(n).toLocaleString('ru-RU')+' ₽';}
function today(){const d=new Date();return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0');}
function nowt(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fdt(dt){if(!dt)return'';const d=new Date(dt);return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'})+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function isOv(dt){return dt&&new Date(dt)<new Date();}
function toast(msg,t='s'){const el=document.createElement('div');el.className='to '+t;el.textContent=msg;document.getElementById('tco').appendChild(el);setTimeout(()=>el.remove(),3200);}
function ubadge(){
  const uc=S.chats.reduce((s,c)=>s+c.unread,0);const cb=document.getElementById('cbadge');if(cb){cb.textContent=uc;cb.style.display=uc?'':'none';}
  const mn=S.user?.name,mt=S.deals.filter(d=>isTaskDeal(d,mn)&&dealBucket(d,mn)==='today').length;
  const tb=document.getElementById('tbadge');if(tb){tb.textContent=mt;tb.style.display=mt?'':'none';}
}
function initPanelResize(){
  const panel=document.getElementById('dpanel'),h=document.getElementById('dp-resize');if(!panel||!h)return;
  let sx=0,sw=0,dr=false;
  h.addEventListener('mousedown',e=>{dr=true;sx=e.clientX;sw=panel.offsetWidth;h.classList.add('active');e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(!dr)return;const nw=Math.max(500,Math.min(window.innerWidth-100,sw+(sx-e.clientX)));panel.style.width=nw+'px';});
  document.addEventListener('mouseup',()=>{if(dr){dr=false;h.classList.remove('active');}});
}

// ── CHECKER ────────────────────────────────────────────────
let _ci=null;
function startChecker(){if(_ci)clearInterval(_ci);_ci=setInterval(checkR,30000);checkR();}
function checkR(){
  const mn=S.user?.name,now=new Date();
  S.deals.forEach(d=>(d.reminders||[]).forEach(r=>{
    if(r.done||r._n)return;
    if((!r.who||r.who===mn)&&new Date(r.datetime)<=now){
      r._n=true;toast('⏰ '+d.name+': '+r.text,'w');
      if(Notification.permission==='granted')new Notification('МиниCRM',{body:d.name+': '+r.text});
      playBeep();tgRem(d,r);save();
    }
  }));
  // Периодически тянем свежие данные из Supabase (раз в 30 сек)
  if(sbReady)sbPullShared().then(()=>{
    const fresh=SHARED_KEYS.some(k=>{
      const old=JSON.stringify(S[k]),nw=localStorage.getItem('crm7_'+k);
      return nw&&nw!==old;
    });
    if(fresh){SHARED_KEYS.forEach(k=>{S[k]=LS.get(k,S[k]);});render();}
  });
}
function playBeep(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.value=0.2;o.start();setTimeout(()=>{g.gain.linearRampToValueAtTime(0,ctx.currentTime+0.3);setTimeout(()=>ctx.close(),400);},80);}catch{}}
function askNotif(){if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();}
function canSeeDeal(d){if(isAdmin())return true;const me=S.user?.name;if(d.stage===firstKey())return true;return(d.assignees||[]).includes(me);}

// ── RENDER ─────────────────────────────────────────────────
function render(){
  ubadge();const el=document.querySelector(`.ni[data-page="${S.page}"]`);
  if(el){document.querySelectorAll('.ni').forEach(e=>e.classList.remove('active'));el.classList.add('active');}
  const c=document.getElementById('content');
  if(S.page==='dashboard')c.innerHTML=rDash();
  else if(S.page==='deals'){c.innerHTML=rDeals();initDrag();}
  else if(S.page==='tasks')c.innerHTML=rTasks();
  else if(S.page==='chats')c.innerHTML=rChats();
  else if(S.page==='contacts')c.innerHTML=rContacts();
  else if(S.page==='settings')c.innerHTML=rSettings();
}

// ── DASHBOARD ──────────────────────────────────────────────
function rDash(){
  const md=S.deals.filter(canSeeDeal),tot=md.reduce((s,d)=>s+d.amount,0),won=md.filter(d=>d.stage==='won').reduce((s,d)=>s+d.amount,0);
  const mn=S.user?.name,ma=S.deals.filter(d=>isTaskDeal(d,mn)).length,un=S.chats.reduce((s,c)=>s+c.unread,0);
  const up=[];S.deals.forEach(d=>(d.reminders||[]).filter(r=>!r.done&&(!r.who||r.who===mn)).forEach(r=>up.push({...r,dn:d.name,did:d.id})));
  up.sort((a,b)=>new Date(a.datetime)-new Date(b.datetime));
  let mgrH='';
  if(isAdmin()){
    const noOwner=S.deals.filter(d=>(d.reminders||[]).some(r=>!r.done&&!r.who)&&(d.assignees||[]).length===0).length;
    mgrH=`<div class="dcard" style="grid-column:1/-1"><div class="dcardt">Задачи по менеджерам</div>
      ${S.managers.map(m=>{const cnt=S.deals.filter(d=>isTaskDeal(d,m.name)).length;return`<div class="mgr-task-row"><div style="display:flex;align-items:center;gap:8px"><div class="av ${roleBgCls(m.role)}" style="width:24px;height:24px;font-size:9px">${ini(m.name)}</div><span style="color:${roleColor(m.role)};font-weight:500">${esc(m.name)}</span><span class="rbg ${roleBadge(m.role)}" style="font-size:9px">${roleLabel(m.role)}</span></div><div class="mgr-task-cnt">${cnt}</div></div>`;}).join('')}
      <div class="mgr-task-row" style="border-top:1px solid var(--border);margin-top:4px;padding-top:10px"><span style="color:var(--text3)">Без ответственного (с будильником)</span><span class="mgr-task-cnt" style="color:${noOwner?'var(--red)':'var(--text3)'}">${noOwner}</span></div>
    </div>`;
  }
  return`<div class="sg"><div class="sc"><div class="sl">Воронка</div><div class="sv">${fmt(tot)}</div><div style="font-size:11px;color:var(--text2);margin-top:5px">${md.length} сделок</div></div><div class="sc"><div class="sl">Выиграно</div><div class="sv" style="color:var(--green)">${fmt(won)}</div><div style="font-size:11px;color:var(--green-text);margin-top:5px">${md.filter(d=>d.stage==='won').length} закрытых</div></div><div class="sc"><div class="sl">Мои задачи</div><div class="sv" style="color:${ma?'var(--amber)':'var(--text)'}">${ma}</div><div style="font-size:11px;color:var(--text2);margin-top:5px">с будильником</div></div><div class="sc"><div class="sl">Чаты</div><div class="sv" style="color:${un?'var(--red)':'var(--text)'}">${un}</div><div style="font-size:11px;color:var(--text2);margin-top:5px">непрочитанных</div></div></div>
  <div class="dg">${mgrH}
    <div class="dcard"><div class="dcardt">Последние сделки</div>${md.slice(-5).reverse().map(d=>`<div class="dr" style="cursor:pointer" onclick="openDeal(${d.id})"><div><div style="font-size:13px;font-weight:500">${esc(d.name)}</div><div style="font-size:11px;color:var(--text2)">${esc(d.contact)}</div></div><div style="text-align:right"><div style="font-size:12px;font-weight:600;color:var(--blue);font-family:var(--mono)">${fmt(d.amount)}</div></div></div>`).join('')}</div>
    <div class="dcard"><div class="dcardt">Мои будильники</div>${up.length===0?'<div style="font-size:13px;color:var(--text3);padding:10px 0">Нет напоминаний</div>':up.slice(0,6).map(r=>`<div class="dr" style="cursor:pointer" onclick="openDeal(${r.did})"><div><div style="font-size:13px;font-weight:500">${esc(r.text)}</div><div style="font-size:11px;color:var(--text2)">${esc(r.dn)}</div></div><div style="font-size:11px;font-family:var(--mono);color:${isOv(r.datetime)?'var(--red-text)':'var(--text3)'}">${fdt(r.datetime)}</div></div>`).join('')}</div>
  </div>`;
}

// ── DEALS ──────────────────────────────────────────────────
function rDeals(){
  return`<div class="kw-outer"><div class="kw-scroll"><div class="kw" id="kanban">
    ${S.stages.map(s=>{const cols=S.deals.filter(d=>d.stage===s.key).filter(canSeeDeal);const hdr=isAdmin()?`<input class="kh-input" value="${esc(s.label)}" style="color:${s.tc}" onblur="renameStage('${s.key}',this.value)" onkeydown="if(event.key==='Enter')this.blur()">`:`<span class="kh-label">${esc(s.label)}</span>`;return`<div class="kol" data-stage="${s.key}"><div class="kh" style="background:${s.bg};color:${s.tc}">${hdr}<div style="display:flex;align-items:center;gap:3px;flex-shrink:0"><span style="opacity:.6;font-size:11px;font-family:var(--mono)">${cols.length}</span>${isAdmin()?`<button class="kh-del" onclick="deleteStage('${s.key}')">✕</button>`:''}</div></div>
    <div class="kb" id="kb-${s.key}" ondragover="oCDO(event,'${s.key}')" ondragleave="oCDL(event,'${s.key}')" ondrop="oCDrop(event,'${s.key}')">
      ${cols.map(d=>{const hr=(d.reminders||[]).some(r=>!r.done),ov=(d.reminders||[]).some(r=>!r.done&&isOv(r.datetime)),mc=(d.messages||[]).length;const chips=(d.assignees||[]).slice(0,3).map(a=>`<div class="asgn-chip"><div class="asgn-dot"></div>${esc(a)}</div>`).join('');return`<div class="dl" id="dl-${d.id}"></div><div class="dc" id="dc-${d.id}" draggable="true" ondragstart="oDS(event,${d.id})" ondragend="oDE()" ondragover="oCDO2(event,${d.id})">${hr?`<div class="rbadge ${ov?'ov':''}" title="Есть будильник"></div>`:''}<div class="dn">${esc(d.name)}</div><div class="dct">${esc(d.contact)}</div><div class="dam">${fmt(d.amount)}</div><div class="df"><span class="tag ${d.source==='avito'?'ta':'tp'}">${d.source==='avito'?'Авито':'Телефон'}</span><span style="font-size:10px;color:var(--text3);font-family:var(--mono)">${d.date||''}</span></div>${chips?`<div class="asgn-chips">${chips}</div>`:`<div style="font-size:10px;color:var(--text3);margin-top:3px">Без ответственного</div>`}<div class="dco" onclick="openDeal(${d.id})"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1V8"/><path d="M13 1h2v2M15 1l-7 7"/></svg>Открыть${mc?' · 💬'+mc:''}</div></div>`;}).join('')}
      <div class="dl" id="dl-e-${s.key}"></div><div class="kadd" onclick="openModal('new-deal','${s.key}')">+ добавить</div>
    </div></div>`;}).join('')}
    ${isAdmin()?`<div class="add-stage-col"><div class="add-stage-btn" onclick="openModal('new-stage')">+ Новый этап</div></div>`:''}
  </div></div></div>`;
}
function renameStage(k,v){const s=S.stages.find(s=>s.key===k);if(s&&v.trim()){s.label=v.trim();save();}}
function deleteStage(k){if(S.deals.some(d=>d.stage===k)){toast('Сначала перенесите сделки','e');return;}if(!confirm('Удалить этап?'))return;S.stages=S.stages.filter(s=>s.key!==k);save();render();}
let drid=null,droc=null,drob=null;
function initDrag(){}
function oDS(e,id){drid=id;setTimeout(()=>{const el=document.getElementById('dc-'+id);if(el)el.classList.add('dragging');},0);e.dataTransfer.effectAllowed='move';}
function oDE(){if(drid){const el=document.getElementById('dc-'+drid);if(el)el.classList.remove('dragging');}clrDr();drid=null;droc=null;drob=null;}
function clrDr(){document.querySelectorAll('.kb').forEach(el=>el.classList.remove('dov'));document.querySelectorAll('.dl').forEach(el=>el.style.display='none');}
function oCDO(e,sk){e.preventDefault();e.dataTransfer.dropEffect='move';if(droc!==sk){clrDr();droc=sk;}document.getElementById('kb-'+sk)?.classList.add('dov');const dl=document.getElementById('dl-e-'+sk);if(dl)dl.style.display='block';drob=null;}
function oCDO2(e,tid){e.preventDefault();e.stopPropagation();if(tid===drid)return;const sk=S.deals.find(d=>d.id===tid)?.stage;if(!sk)return;clrDr();droc=sk;document.getElementById('kb-'+sk)?.classList.add('dov');const dl=document.getElementById('dl-'+tid);if(dl)dl.style.display='block';drob=tid;}
function oCDL(e,sk){const b=document.getElementById('kb-'+sk);if(b&&!b.contains(e.relatedTarget)){b.classList.remove('dov');clrDr();droc=null;drob=null;}}
function oCDrop(e,sk){
  e.preventDefault();if(drid===null)return;const d=S.deals.find(d=>d.id===drid);if(!d)return;const old=d.stage;
  S.deals=S.deals.filter(d=>d.id!==drid);
  if(drob!==null){const i=S.deals.findIndex(d=>d.id===drob);d.stage=sk;S.deals.splice(i,0,d);}
  else{d.stage=sk;const l=S.deals.filter(d=>d.stage===sk).slice(-1)[0];if(l)S.deals.splice(S.deals.findIndex(d=>d.id===l.id)+1,0,d);else S.deals.push(d);}
  if(old===firstKey()&&sk!==firstKey()){const me=S.user?.name;if(me&&!(d.assignees||[]).includes(me)){if(!d.assignees)d.assignees=[];d.assignees.push(me);setTodayRem(d,me);toast('Вы назначены ответственным');}}
  if(old!==sk)toast('→ "'+S.stages.find(s=>s.key===sk)?.label+'"');
  save();render();
}
function setTodayRem(d,who){if(!d.reminders)d.reminders=[];const te=new Date();te.setHours(23,59,0,0);const ds=te.toISOString().slice(0,16);if(!d.reminders.find(r=>r.text===DEF_REM&&!r.done&&r.who===who))d.reminders.push({id:Date.now(),text:DEF_REM,datetime:ds,done:false,who});}

// ── TASKS ──────────────────────────────────────────────────
function rTasks(){
  const me=S.user?.name,vn=isAdmin()&&S.taskFilter!=='me'?S.taskFilter:me,td=S.deals.filter(d=>isTaskDeal(d,vn));
  let fb='';
  if(isAdmin()){const tabs=[{key:'me',label:'Мои задачи'},...S.managers.filter(m=>m.name!==me).map(m=>({key:m.name,label:m.name}))];fb=`<div class="tfilter">${tabs.map(t=>`<div class="tftab ${S.taskFilter===t.key?'active':''}" onclick="setTF('${esc(t.key)}')">${esc(t.label)}</div>`).join('')}</div>`;}
  if(td.length===0)return`${fb}<div style="text-align:center;padding:50px 20px;color:var(--text3)"><div style="font-size:36px;margin-bottom:12px">⏰</div><div style="font-size:15px;font-weight:500;color:var(--text2);margin-bottom:6px">Нет активных задач</div><div style="font-size:13px">Сделки с будильником на тебя появятся здесь</div></div>`;
  return`${fb}<div class="kw-outer"><div class="kw-scroll"><div class="kw">${TBUCKETS.map(bk=>{const cols=td.filter(d=>dealBucket(d,vn)===bk.key),col={today:['#dbeafe','#1e40af'],tomorrow:['#fef3c7','#92400e'],after:['#ede9fe','#3730a3'],later:['#f1f5f9','#475569']}[bk.key];return`<div class="kol" style="min-width:240px;width:240px"><div class="kh" style="background:${col[0]};color:${col[1]}"><span>${bk.label}</span><span style="opacity:.65;font-size:11px;font-family:var(--mono)">${cols.length}</span></div><div class="kb">${cols.length===0?'<div style="font-size:12px;color:var(--text3);padding:8px 4px;text-align:center">—</div>':''}${cols.map(d=>{const p=(d.reminders||[]).filter(r=>!r.done&&(!r.who||r.who===vn)).sort((a,b)=>new Date(a.datetime)-new Date(b.datetime)),ovc=p.length&&isOv(p[0].datetime),note=d.note||'';const nh=note.length>NOTE_LIMIT?`<div class="note-short" id="ns-${d.id}">${esc(note.slice(0,NOTE_LIMIT))}…</div><span class="note-more" onclick="event.stopPropagation();toggleNote(${d.id})">Показать полностью</span><div id="nf-${d.id}" style="display:none;font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5">${esc(note)}<br><span class="note-more" onclick="event.stopPropagation();toggleNote(${d.id})">Скрыть</span></div>`:(note?`<div style="font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5">${esc(note)}</div>`:'');return`<div class="dc task-card ${ovc?'ov-card':''}" onclick="openDeal(${d.id})"><div class="dn">${esc(d.name)}</div><div class="dct">${esc(d.contact)}</div><div class="dam">${fmt(d.amount)}</div><div class="df"><span class="tag ${d.source==='avito'?'ta':'tp'}">${d.source==='avito'?'Авито':'Телефон'}</span><span style="font-size:10px;color:var(--text2)">${esc(S.stages.find(s=>s.key===d.stage)?.label||d.stage)}</span></div>${nh}<div class="task-rems">${p.map(r=>`<div class="trr ${isOv(r.datetime)?'ov':''}"><div class="trr-text">${esc(r.text)}</div><div class="trr-time">${fdt(r.datetime)}</div></div>`).join('')}</div><div class="asgn-chips" style="margin-top:5px">${(d.assignees||[]).map(a=>`<div class="asgn-chip"><div class="asgn-dot"></div>${esc(a)}</div>`).join('')}</div></div>`;}).join('')}</div></div>`;}).join('')}</div></div></div>`;
}
function setTF(k){S.taskFilter=k;localStorage.setItem('crm7_taskFilter',JSON.stringify(k));render();}
function toggleNote(id){const s=document.getElementById('ns-'+id),f=document.getElementById('nf-'+id);if(!s||!f)return;if(f.style.display==='none'){f.style.display='block';s.style.display='none';}else{f.style.display='none';s.style.display='block';}}

// ── DEAL PANEL ─────────────────────────────────────────────
function openDeal(id){S.openDeal=id;rPanel();document.getElementById('pov').classList.add('open');document.getElementById('dpanel').classList.add('open');askNotif();setTimeout(()=>{const ml=document.getElementById('dpml');if(ml)ml.scrollTop=ml.scrollHeight;},80);}
function closePanel(){document.getElementById('pov').classList.remove('open');document.getElementById('dpanel').classList.remove('open');S.openDeal=null;}
function rPanel(){
  const d=S.deals.find(d=>d.id===S.openDeal);if(!d)return;
  document.getElementById('dptit').textContent=d.name;
  const al=(d.assignees||[]).map(a=>`<div class="asgn-item"><div class="asgn-dot"></div><span>${esc(a)}</span><button class="asgn-rm" onclick="removeAsgn(${d.id},'${esc(a)}')">✕</button></div>`).join('');
  const av=S.managers.filter(m=>!(d.assignees||[]).includes(m.name));
  document.getElementById('dpinfo').innerHTML=`
    <div><div class="dst">Основное</div>${efRow(d,'name','Название',d.name)}${efRow(d,'contact','Контакт',d.contact)}${efRow(d,'phone','Телефон',d.phone||'—')}${efRowSel(d,'source','Источник',d.source,['avito:Авито','phone:Телефон'])}${efRowNum(d,'amount','Сумма',fmt(d.amount))}</div>
    <div><div class="dst">Стадия</div><select class="dpss" onchange="chStage(${d.id},this.value)">${S.stages.map(s=>`<option value="${s.key}"${d.stage===s.key?' selected':''}>${s.label}</option>`).join('')}</select></div>
    <div><div class="dst">Ответственные</div>
      <div class="asgn-block">
        <div class="asgn-list">${al||'<div style="font-size:11px;color:var(--text3)">Не назначено</div>'}</div>
        ${av.length?`<div style="display:flex;gap:6px;align-items:center"><select id="asel" class="dpss" style="flex:1;font-size:12px;padding:5px 8px"><option value="">+ Добавить...</option>${av.map(m=>`<option value="${esc(m.name)}">${esc(m.name)}</option>`).join('')}</select><button class="btn btn-s btn-p" onclick="addAsgn(${d.id})">Добавить</button></div>`:'<div style="font-size:11px;color:var(--text3)">Все назначены</div>'}
        <button class="btn btn-s btn-g" style="width:100%;margin-top:7px" onclick="takeOwn(${d.id})">👤 Взять себе</button>
      </div>
    </div>
    <div><div class="dst">Примечание</div><textarea class="nota" placeholder="Заметки..." oninput="saveNote(${d.id},this.value)">${esc(d.note||'')}</textarea></div>
    <div><div class="rb"><div class="dst" style="margin-bottom:0;display:flex;justify-content:space-between;align-items:center"><span>Будильники</span><button class="btn btn-s" onclick="openModal('add-rem',${d.id})" style="padding:3px 9px;font-size:11px">+ Добавить</button></div><div class="rl" id="dprl">${rRemList(d)}</div></div></div>
    <div style="margin-top:auto;display:flex;flex-direction:column;gap:5px">${isAdmin()?`<button class="btn btn-s btn-d" onclick="delDeal(${d.id})">🗑 Удалить сделку</button>`:''}</div>
  `;
  document.getElementById('dpchat').innerHTML=`
    <div class="dpch"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 2H3a1 1 0 00-1 1v7a1 1 0 001 1h2l3 3 3-3h2a1 1 0 001-1V3a1 1 0 00-1-1z"/></svg>Переписка — ${(d.messages||[]).length} сообщений</div>
    <div class="msgs" id="dpml">${(d.messages||[]).length===0?'<div style="text-align:center;color:var(--text3);padding:24px;font-size:13px">Сообщений нет</div>':''}${(d.messages||[]).map(m=>renderMsg(m)).join('')}</div>
    <div class="inr">
      <input type="file" id="dpfile" style="display:none" onchange="attachFile(${d.id},'deal')">
      <button class="ibtn" onclick="document.getElementById('dpfile').click()" title="Файл">📎</button>
      <textarea id="dpmsg" placeholder="Написать... (Enter)" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendDM(${d.id})}" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="btn btn-p" onclick="sendDM(${d.id})"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2L2 6.5l5 2 2 5 5-12z"/></svg></button>
    </div>
  `;
}
function efRow(d,f,l,v){return`<div class="ef" onclick="startEF(${d.id},'${f}',this)"><span class="ef-label">${l}</span><span class="ef-val">${esc(v)}</span><span class="ef-edit">✏️</span></div>`;}
function efRowNum(d,f,l,v){return`<div class="ef" onclick="startEF(${d.id},'${f}',this,'number')"><span class="ef-label">${l}</span><span class="ef-val">${esc(v)}</span><span class="ef-edit">✏️</span></div>`;}
function efRowSel(d,f,l,v,opts){const dis=opts.find(o=>o.startsWith(v+':'))?.split(':')[1]||v;return`<div class="ef" onclick="startEFSel(${d.id},'${f}',this,'${opts.join(',')}')"><span class="ef-label">${l}</span><span class="ef-val">${esc(dis)}</span><span class="ef-edit">✏️</span></div>`;}
function startEF(did,f,el,t){const d=S.deals.find(d=>d.id===did);if(!d)return;const cur=f==='amount'?d.amount:(d[f]||'');const vEl=el.querySelector('.ef-val');const inp=document.createElement('input');inp.className='ef-input';inp.type=t||'text';inp.value=cur;vEl.replaceWith(inp);inp.focus();inp.select();function commit(){let v=inp.value.trim();if(f==='amount')v=parseInt(v)||d.amount;d[f]=v;save();rPanel();if(S.page==='deals')render();}inp.addEventListener('blur',commit);inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.removeEventListener('blur',commit);rPanel();}});}
function startEFSel(did,f,el,optsStr){const d=S.deals.find(d=>d.id===did);if(!d)return;const opts=optsStr.split(',');const vEl=el.querySelector('.ef-val');const sel=document.createElement('select');sel.className='ef-input';sel.style.cursor='pointer';opts.forEach(o=>{const[k,v]=o.split(':');const opt=document.createElement('option');opt.value=k;opt.textContent=v;if(k===d[f])opt.selected=true;sel.appendChild(opt);});vEl.replaceWith(sel);sel.focus();function commit(){d[f]=sel.value;save();rPanel();if(S.page==='deals')render();}sel.addEventListener('blur',commit);sel.addEventListener('change',()=>sel.blur());}
function rRemList(d){if(!d.reminders||d.reminders.length===0)return'<div style="font-size:12px;color:var(--text3);padding:4px 0">Нет напоминаний</div>';return d.reminders.map(r=>`<div class="ri ${r.done?'done':''} ${!r.done&&isOv(r.datetime)?'ov':''}"><input type="checkbox" ${r.done?'checked':''} onchange="togRem(${d.id},${r.id})" style="flex-shrink:0;cursor:pointer"><div class="rit"><div class="rit-text">${esc(r.text)}</div><div class="rit-meta"><span class="ritm">${fdt(r.datetime)}</span>${r.who?`<span class="ri-who">👤 ${esc(r.who)}</span>`:''}</div></div><button class="ribtn" onclick="openModal('edit-rem',{did:${d.id},rid:${r.id}})" title="Изменить">✏️</button><button class="ribtn" onclick="delRem(${d.id},${r.id})" title="Удалить">✕</button></div>`).join('');}
function chStage(id,sk){const d=S.deals.find(d=>d.id===id);if(!d)return;d.stage=sk;if((!d.assignees||d.assignees.length===0)&&sk!==firstKey()){const me=S.user?.name;if(me){if(!d.assignees)d.assignees=[];d.assignees.push(me);setTodayRem(d,me);toast('Вы назначены ответственным');}}save();rPanel();render();}
function addAsgn(id){const sel=document.getElementById('asel');if(!sel||!sel.value)return;const d=S.deals.find(d=>d.id===id);if(!d)return;if(!d.assignees)d.assignees=[];if(!d.assignees.includes(sel.value)){d.assignees.push(sel.value);setTodayRem(d,sel.value);toast('Добавлен: '+sel.value);}save();rPanel();render();}
function removeAsgn(id,name){const d=S.deals.find(d=>d.id===id);if(!d)return;d.assignees=(d.assignees||[]).filter(a=>a!==name);save();rPanel();render();toast('Убран: '+name);}
function takeOwn(id){const d=S.deals.find(d=>d.id===id);if(!d)return;const me=S.user?.name;if(!me)return;if(!d.assignees)d.assignees=[];if(!d.assignees.includes(me)){d.assignees.push(me);setTodayRem(d,me);}if(d.stage===firstKey()){d.stage=secondKey();toast('→ "'+S.stages[1]?.label+'" + будильник');}else toast('Взяли в работу · будильник');save();rPanel();render();askNotif();}
function saveNote(id,v){const d=S.deals.find(d=>d.id===id);if(d){d.note=v;save();}}
function sendDM(id){const t=document.getElementById('dpmsg');if(!t||!t.value.trim())return;const d=S.deals.find(d=>d.id===id);if(!d)return;if(!d.messages)d.messages=[];d.messages.push({type:'text',out:true,text:t.value.trim(),time:nowt(),author:S.user?.name||'Менеджер'});t.value='';save();rPanel();setTimeout(()=>{const ml=document.getElementById('dpml');if(ml)ml.scrollTop=ml.scrollHeight;},40);}
function togRem(did,rid){const d=S.deals.find(d=>d.id===did);if(!d)return;const r=d.reminders.find(r=>r.id===rid);if(!r)return;r.done=!r.done;save();const el=document.getElementById('dprl');if(el)el.innerHTML=rRemList(d);ubadge();if(S.page==='tasks')render();}
function delRem(did,rid){const d=S.deals.find(d=>d.id===did);if(!d)return;d.reminders=d.reminders.filter(r=>r.id!==rid);save();const el=document.getElementById('dprl');if(el)el.innerHTML=rRemList(d);ubadge();if(S.page==='tasks')render();}
function delDeal(id){if(!confirm('Удалить?'))return;S.deals=S.deals.filter(d=>d.id!==id);save();closePanel();render();toast('Удалено','e');}
function renderMsg(m){if(m.type==='file')return`<div style="align-self:${m.out?'flex-end':'flex-start'};max-width:76%">${!m.out&&m.author?`<div class="mau">${esc(m.author)}</div>`:''}<div class="mfile" onclick="dlFile('${m.dataUrl||''}','${esc(m.fileName||'file')}')"><div class="mfi">📎</div><div><div style="font-size:12px;font-weight:500">${esc(m.fileName||'Файл')}</div><div style="font-size:10px;color:var(--text3)">${m.fileSize||''}</div></div></div><div class="mt" style="${m.out?'':'text-align:left'}">${m.time||''}</div></div>`;const isTg=m.source==='telegram';return`<div class="msg ${m.out?'mo':'mi'} ${isTg?'msg-tg':''}">${!m.out&&m.author?`<div class="mau">${esc(m.author)}${isTg?' <span style="background:var(--tg-bg);color:var(--tg);border-radius:20px;padding:1px 5px;font-size:9px;font-weight:600">TG</span>':''}</div>`:''}${esc(m.text||'')}<div class="mt">${m.time||''}</div></div>`;}
function dlFile(u,n){if(!u)return;const a=document.createElement('a');a.href=u;a.download=n;a.click();}
function fmtSz(b){if(b<1024)return b+'B';if(b<1048576)return Math.round(b/1024)+'KB';return(b/1048576).toFixed(1)+'MB';}
async function attachFile(id,ctx){const inp=document.getElementById(ctx==='deal'?'dpfile':'chfile');if(!inp||!inp.files[0])return;const file=inp.files[0];toast('Загрузка файла...','i');
  // Пробуем Supabase Storage, иначе base64
  const storageUrl=await uploadFileToStorage(file);
  const buildMsg=(dataUrl)=>({type:'file',out:true,fileName:file.name,fileSize:fmtSz(file.size),dataUrl:storageUrl||dataUrl,time:nowt(),author:S.user?.name||'Менеджер'});
  if(storageUrl){
    const msg=buildMsg(null);
    if(ctx==='deal'){const d=S.deals.find(d=>d.id===id);if(!d)return;if(!d.messages)d.messages=[];d.messages.push(msg);save();rPanel();setTimeout(()=>{const ml=document.getElementById('dpml');if(ml)ml.scrollTop=ml.scrollHeight;},40);}
    else{S.chats[S.ac].messages.push(msg);S.chats[S.ac].time=nowt();save();render();setTimeout(()=>{const ml=document.getElementById('ml');if(ml)ml.scrollTop=ml.scrollHeight;},60);}
    toast('\u0424\u0430\u0439\u043b \u0437\u0430\u0433\u0440\u0443\u0436\u0435\u043d \u0432 Storage');inp.value='';return;
  }
  // Fallback: base64
  const reader=new FileReader();reader.onload=e=>{const msg=buildMsg(e.target.result);if(ctx==='deal'){const d=S.deals.find(d=>d.id===id);if(!d)return;if(!d.messages)d.messages=[];d.messages.push(msg);save();rPanel();setTimeout(()=>{const ml=document.getElementById('dpml');if(ml)ml.scrollTop=ml.scrollHeight;},40);}else{S.chats[S.ac].messages.push(msg);S.chats[S.ac].time=nowt();save();render();setTimeout(()=>{const ml=document.getElementById('ml');if(ml)ml.scrollTop=ml.scrollHeight;},60);}toast('\u0424\u0430\u0439\u043b \u043f\u0440\u0438\u043a\u0440\u0435\u043f\u043b\u0451\u043d (\u043b\u043e\u043a\u0430\u043b\u044c\u043d\u043e)');};reader.readAsDataURL(file);inp.value='';}

// ── CHATS ──────────────────────────────────────────────────
function rChats(){
  const sorted=[...S.chats].sort((a,b)=>{const ta=a.messages[a.messages.length-1]?.time||a.time||'';const tb=b.messages[b.messages.length-1]?.time||b.time||'';return tb.localeCompare(ta);});

    <div class="chlist"><div class="cllh">Диалоги (${S.chats.length})</div>
      ${sorted.map(c=>{const deal=c.dealId?S.deals.find(d=>d.id===c.dealId):null,lm=c.messages[c.messages.length-1];return`<div class="chi ${c.id===ch.id?'active':''}" onclick="setChat(${c.id})"><div class="chrow"><div class="chav" style="background:${c.avBg};color:${c.avTc};width:34px;height:34px;font-size:12px">${c.av}</div><div class="chm"><div style="display:flex;justify-content:space-between;align-items:baseline"><div class="chn">${esc(c.name)}</div><div class="cht">${c.time}</div></div><div class="chp">${esc(lm?.text||lm?.fileName||'')}</div>${deal?`<div class="cha" style="color:var(--blue-text);font-weight:500">📋 ${esc(deal.name)}</div>`:`<div class="cha">📌 ${esc(c.ad||'')}</div>`}</div>${c.unread?'<div class="ud"></div>':''}</div></div>`;}).join('')}
      <div style="padding:10px 14px"><button class="btn btn-s" style="width:100%" onclick="openModal('new-chat')">+ Новый чат</button></div>
    </div>
    <div class="chwin">
      <div class="chwh"><div class="chav" style="background:${ch.avBg};color:${ch.avTc};width:32px;height:32px;font-size:11px">${ch.av}</div><div style="flex:1"><div style="font-size:14px;font-weight:600">${esc(ch.name)}</div>${ch.dealId&&S.deals.find(d=>d.id===ch.dealId)?`<div style="font-size:11px;color:var(--blue-text);cursor:pointer;font-weight:500" onclick="openDeal(${ch.dealId})">📋 ${esc(S.deals.find(d=>d.id===ch.dealId)?.name)}</div>`:''}</div><span class="tag ta">Авито</span><button class="btn btn-s" onclick="openModal('link-deal-ch')">К сделке</button></div>
      <div class="msgs" id="ml">${ch.messages.map(m=>renderMsg(m)).join('')}</div>
      <div class="inr"><input type="file" id="chfile" style="display:none" onchange="attachFile(null,'chat')"><button class="ibtn" onclick="document.getElementById('chfile').click()" title="Файл">📎</button><textarea id="cht" placeholder="Написать... (Enter)" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendCM()}" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea><button class="btn btn-p" onclick="sendCM()"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2L2 6.5l5 2 2 5 5-12z"/></svg></button></div>
    </div>
  </div>`;
}
function setChat(chatId){const idx=S.chats.findIndex(c=>c.id===chatId);if(idx>=0){S.ac=idx;S.chats[idx].unread=0;}localStorage.setItem('crm7_ac',JSON.stringify(S.ac));save();render();setTimeout(()=>{const ml=document.getElementById('ml');if(ml)ml.scrollTop=ml.scrollHeight;},60);}
function sendCM(){const t=document.getElementById('cht');if(!t||!t.value.trim())return;const ch=S.chats[S.ac];if(!ch)return;ch.messages.push({type:'text',out:true,text:t.value.trim(),time:nowt()});ch.time=nowt();t.value='';save();render();setTimeout(()=>{const ml=document.getElementById('ml');if(ml)ml.scrollTop=ml.scrollHeight;},60);}

// ── CONTACTS ───────────────────────────────────────────────

function toggleSpoiler(id){
  const body=document.getElementById(id+'-body'),arr=document.getElementById(id+'-arr');
  if(!body||!arr)return;
  const open=body.classList.toggle('open');arr.classList.toggle('open',open);
}

// Supabase manual
async function manualPush(){if(!sbReady){toast('Supabase не настроен','e');return;}toast('Загрузка...','i');for(const k of SHARED_KEYS)await sbPushKey(k,S[k]);toast('Загружено в Supabase');}
async function manualPull(){if(!sbReady){toast('Supabase не настроен','e');return;}toast('Получение...','i');await sbPullShared();SHARED_KEYS.forEach(k=>{S[k]=LS.get(k,S[k]);});render();toast('Данные обновлены');}

// Telegram
function saveTgCfg(){TG={botToken:document.getElementById('tg-token')?.value?.trim()||'',chatId:document.getElementById('tg-chat')?.value?.trim()||'',enabled:document.getElementById('tg-en')?.checked||false,notifyNew:document.getElementById('tg-new')?.checked||false,notifyRem:document.getElementById('tg-rem')?.checked||false};LS.set('tg_cfg',TG);toast('Telegram сохранён');render();}
async function testTg(){const ok=await tgSend('✅ МиниCRM — тест соединения успешен!');toast(ok?'Telegram: сообщение отправлено!':'Ошибка — проверь токен и chat_id',ok?'s':'e');}

// Managers
async function saveMgr(id,field,val){if(!val.trim())return;if(field==='login'&&S.managers.find(m2=>m2.login===val&&m2.id!==id)){toast('Логин занят','e');return;}const m=S.managers.find(m=>m.id===id);if(!m)return;if(field==='role'&&val==='superadmin'&&!isSuperAdmin()){toast('Нет прав','e');return;}
  if(field==='password'){m.passwordHash=await sha256(val.trim());delete m.password;}else{m[field]=val.trim();}
  if(S.user?.id===id){S.user[field]=val.trim();localStorage.setItem('crm7_user',JSON.stringify(S.user));}save();updateSb();toast('Сохранено');}
function delMgr(id){const m=S.managers.find(m=>m.id===id);if(!m)return;if(m.role==='superadmin'&&!isSuperAdmin()){toast('Нельзя удалить Супер-администратора','e');return;}if(!confirm('Удалить?'))return;S.managers=S.managers.filter(m=>m.id!==id);save();render();toast('Удалено','e');}
function expD(){const b=new Blob([JSON.stringify({deals:S.deals,contacts:S.contacts,chats:S.chats,managers:S.managers,stages:S.stages},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='crm-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function impD(i){const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.deals)S.deals=d.deals;if(d.contacts)S.contacts=d.contacts;if(d.chats)S.chats=d.chats;if(d.managers)S.managers=d.managers;if(d.stages)S.stages=d.stages;save();render();toast('Импортировано из JSON');}catch{toast('Ошибка файла','e');}};r.readAsText(f);}
function resetD(){if(!confirm('Сбросить все данные?'))return;S.deals=JSON.parse(JSON.stringify(DD));S.contacts=JSON.parse(JSON.stringify(DC));S.chats=JSON.parse(JSON.stringify(DCH));S.managers=JSON.parse(JSON.stringify(DM));S.stages=JSON.parse(JSON.stringify(DSTAGES));S.ndi=10;S.nci=10;save();render();toast('Сброшено','e');}

function closeModal(){document.getElementById('mo').classList.remove('open');}
function addDeal(){const n=document.getElementById('fdn')?.value?.trim()||'Новая сделка';let co=document.getElementById('fdc')?.value;if(co==='__new__')co='Новый клиент';const ph=document.getElementById('fdph')?.value?.trim()||'',a=parseInt(document.getElementById('fda')?.value)||0,s=document.getElementById('fds')?.value||S.stages[0]?.key||'new',sr=document.getElementById('fdsr')?.value||'avito',asn=document.getElementById('fdasn')?.value||null;const nd={id:S.ndi++,name:n,contact:co,phone:ph,amount:a,stage:s,source:sr,date:today(),note:'',reminders:[],messages:[],assignees:asn?[asn]:[]};if(asn)setTodayRem(nd,asn);S.deals.push(nd);save();closeModal();render();tgNew(nd);toast('Сделка создана');}
function addRem(did){const d=S.deals.find(d=>d.id===did);if(!d)return;const t2=document.getElementById('art')?.value?.trim()||DEF_REM,dt=document.getElementById('ardt')?.value,who=document.getElementById('arwho')?.value||S.user?.name;if(!dt){toast('Укажите дату','e');return;}if(!d.reminders)d.reminders=[];d.reminders.push({id:Date.now(),text:t2,datetime:dt,done:false,who});save();closeModal();rPanel();ubadge();if(S.page==='tasks')render();toast('Будильник для: '+who);askNotif();}
function saveEditRem(did,rid){const d=S.deals.find(d=>d.id===did);if(!d)return;const r=d.reminders.find(r=>r.id===rid);if(!r)return;r.text=document.getElementById('ert')?.value?.trim()||r.text;r.datetime=document.getElementById('erdt')?.value||r.datetime;r.who=document.getElementById('erwho')?.value||r.who;r._n=false;save();closeModal();rPanel();toast('Будильник обновлён');}
function addStage(){const n=document.getElementById('stn')?.value?.trim();if(!n){toast('Введите название','e');return;}const cv=document.getElementById('stc')?.value||'#dbeafe:#1e40af';const[bg,tc]=cv.split(':');S.stages.push({key:'s_'+Date.now(),label:n,bg,tc});save();closeModal();render();toast('Этап добавлен');}
function addC(){const n=document.getElementById('fcn')?.value?.trim()||'Контакт',p=document.getElementById('fcp')?.value?.trim()||'—',s=document.getElementById('fcs')?.value||'avito',nt=document.getElementById('fcnt')?.value?.trim()||'';S.contacts.push({id:S.nci++,name:n,phone:p,source:s,note:nt});save();closeModal();render();toast('Контакт добавлен');}
function addChat(){const n=document.getElementById('fchc')?.value||'Клиент',did=parseInt(document.getElementById('fchd')?.value)||null,deal=did?S.deals.find(d=>d.id===did):null;const cols=[['#dbeafe','#1e40af'],['#dcfce7','#166534'],['#fef3c7','#92400e'],['#ede9fe','#3730a3']];const[bg,tc]=cols[S.chats.length%cols.length];S.chats.unshift({id:Date.now(),name:n,av:ini(n),avBg:bg,avTc:tc,unread:0,time:nowt(),dealId:did,ad:deal?.name||'Авито',messages:[]});S.ac=0;save();closeModal();render();toast('Чат создан');}
function linkDealToChat(){const did=parseInt(document.getElementById('fld')?.value),ch=S.chats[S.ac];if(!ch||!did)return;ch.dealId=did;const d=S.deals.find(d=>d.id===did);if(d)ch.ad=d.name;save();closeModal();render();toast('Привязано');}
async function addMgr(){const n=document.getElementById('nmn')?.value?.trim()||'Менеджер',l=document.getElementById('nml')?.value?.trim(),p=document.getElementById('nmp')?.value?.trim(),r=document.getElementById('nmr')?.value||'manager';if(!l||!p){toast('Заполните логин и пароль','e');return;}if(S.managers.find(m=>m.login===l)){toast('Логин занят','e');return;}if(r==='superadmin'&&!isSuperAdmin()){toast('Нет прав','e');return;}
  const passwordHash=await sha256(p);
  S.managers.push({id:S.nmi++,login:l,passwordHash,name:n,role:r});save();closeModal();render();toast('Менеджер добавлен');}
function handleSearch(v){if(S.page==='contacts')render();}

// ── PUBLIC API ─────────────────────────────────────────────
window.receiveAvitoMessage=function(name,text,ad){let c=S.chats.find(c=>c.name===name);if(!c){c={id:Date.now(),name,av:ini(name),avBg:'#dbeafe',avTc:'#1e40af',unread:0,time:nowt(),dealId:null,ad:ad||'Авито',messages:[]};S.chats.unshift(c);}c.messages.push({type:'text',out:false,text,time:nowt(),author:name,source:'avito'});c.unread++;c.time=nowt();save();render();toast('🟠 Авито от '+name);};
window.receiveTelegramMessage=function(fromName,text,tgUserId){let c=S.chats.find(c=>c.tgUserId===tgUserId||c.name===fromName);if(!c){c={id:Date.now(),name:fromName,av:ini(fromName),avBg:'#e8f4fa',avTc:'#0088cc',unread:0,time:nowt(),tgUserId,dealId:null,ad:'Telegram',messages:[]};S.chats.unshift(c);}c.messages.push({type:'text',out:false,text,time:nowt(),author:fromName,source:'telegram'});c.unread++;c.time=nowt();save();render();toast('✈️ Telegram от '+fromName);};

// INIT
applyTheme();
if(!sbReady)document.getElementById('sb-note').style.display='block';
if(S.user)showApp();
else document.getElementById('ls').style.display='flex';
</script>
